# Rime schema
# encoding: utf-8

schema:
  schema_id: caspal_pyjj_wubi
  name: 拼音加加五笔
  version: "0.01"
  author:
    - Caspal
  description: |
    拼音加加双拼方案+五笔辅码
  dependencies:
    - caspal_wubi86

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: simplification
    states: [ 漢字, 汉字 ]
  - name: ascii_punct
    states: [ 。，, ．， ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - reverse_lookup_translator
    - script_translator
  filters:
    - simplifier
    - uniquifier

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"
  algebra:
    - erase/^xx$/
    - derive/^([jqxy])u(;.*?$|$)/$1v$2/
    - derive/^([aoe].*)$/o$1/
    - xform/^([ae])(.*)$/$1$1$2/
    - xform/^([^;]*?)iu(;.*?$|$)/$1N$2/
    - xform/^([^;]*?)[iu]a(;.*?$|$)/$1B$2/
    - xform/^([^;]*?)(er|ing)(;.*?$|$)/$1Q$3/
    - xform/^([^;]*?)[uv]an(;.*?$|$)/$1C$2/
    - xform/^([^;]*?)([uv]e|uai)(;.*?$|$)/$1X$3/
    - xform/^sh/I/
    - xform/^ch/U/
    - xform/^zh/V/
    - xform/^([^;]*?)uo(;.*?$|$)/$1O$2/
    - xform/^([^;]*?)[uv]n(;.*?$|$)/$1Z$2/
    - xform/^([^;]*?)i?ong(;.*?$|$)/$1Y$2/
    - xform/^([^;]*?)[iu]ang(;.*?$|$)/$1H$2/
    - xform/^([^;]*?)en(;.*?$|$)/$1R$2/
    - xform/^([^;]*?)eng(;.*?$|$)/$1T$2/
    - xform/^([^;]*?)ang(;.*?$|$)/$1G$2/
    - xform/^([^;]*?)ian(;.*?$|$)/$1J$2/
    - xform/^([^;]*?)an(;.*?$|$)/$1F$2/
    - xform/^([^;]*?)iao(;.*?$|$)/$1K$2/
    - xform/^([^;]*?)ao(;.*?$|$)/$1D$2/
    - xform/^([^;]*?)ai(;.*?$|$)/$1S$2/
    - xform/^([^;]*?)ei(;.*?$|$)/$1W$2/
    - xform/^([^;]*?)ie(;.*?$|$)/$1M$2/
    - xform/^([^;]*?)ui(;.*?$|$)/$1V$2/
    - xform/^([^;]*?)ou(;.*?$|$)/$1P$2/
    - xform/^([^;]*?)in(;.*?$|$)/$1L$2/
    - xlit/QWRTYUIOPSDFGHMJCKLZXVBN/qwrtyuiopsdfghmjcklzxvbn/
    - derive/^(\w+);(\w)(\w)$/$1$2$3/
    - derive/^(\w+);(\w)(\w)$/$1$2/
    - derive/^(\w+);(\w)(\w)$/$1/
    - derive/^(\w+);(\w)$/$1$2/
    - derive/^(\w+);(\w)$/$1/

