reverse_lookup:
  dictionary: caspal_wubi86
  enable_completion: true
  prefix: "`"
  suffix: "'"
  tips: 〔五笔〕
  comment_format:
    - xform/([nl])v/$1ü/
    - xform/;.*//

punctuator:
  import_preset: default

key_binder:
  import_preset: default

recognizer:
  import_preset: default
  patterns:
    reverse_lookup: "`[a-z]*'?$"
